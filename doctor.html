<script>

const API_URL="https://script.google.com/macros/s/AKfycbyFi5PXNAExANIhgNPVQe2kaEKC42WBgQ2BRc7vqcRiq7VshhL6OSY48_1oWAZDiA4n1g/exec";

const PASSWORD="786786";

let masterData=[];
let selectedDiseases=[];

const sections=[
{
title:'🟠 SECTION 1 — دماغ، ذہن، اعصاب اور نیند',
parts:['دماغ','اعصاب','نیند','مزاج']
},
{
title:'🟡 SECTION 2 — سر، آنکھ، کان، ناک، منہ اور گلا',
parts:['سر','آنکھ','کان','ناک','منہ','نرخرہ']
},
{
title:'🟢 SECTION 3 — سانس، کھانسی، سینہ اور دل',
parts:['سانس','دل','شریانی نظام']
},
{
title:'🟣 SECTION 4 — معدہ، جگر، آنتیں اور نظام ہضم',
parts:['معدہ','شکم','پاخانہ']
},
{
title:'🔵 SECTION 5 — پیشاب، مردانہ و زنانہ نظام',
parts:['نظام بول','مردانہ','زنانہ']
},
{
title:'🔴 SECTION 6 — جسم، جلد، ہڈیاں اور عمومی علامات',
parts:['جلد','حرکت کا نظام','ہاتھ پاوں کے اعضا','عمومی']
}
];

/* LOGIN */

function checkPassword(){

const pass=document.getElementById('doctorPass').value;

if(pass===PASSWORD){

document
.getElementById('loginScreen')
.classList.add('hidden');

document
.getElementById('mainPanel')
.classList.remove('hidden');

loadMasterData();

}else{

alert('غلط پاسورڈ');

}

}

/* LOAD MASTER */

async function loadMasterData(){

const res=await fetch(API_URL+"?action=getMaster");

masterData=await res.json();

renderSections();

}

/* RENDER SECTIONS */

function renderSections(){

const container=document.getElementById('allSections');

container.innerHTML='';

sections.forEach((sec,sindex)=>{

const sectionDiv=document.createElement('div');

sectionDiv.className='section';

/* SECTION TITLE */

let tabs=`
<h3>${sec.title}</h3>
<div class="parts-tabs">
`;

/* PART TABS */

sec.parts.forEach((part,pindex)=>{

const safePart=`sec${sindex}_part${pindex}`;

tabs+=`
<div class="part-btn ${pindex===0?'active-tab':''}"
onclick="showPart('${safePart}',this)">
${part}
</div>
`;

});

tabs+=`</div>`;

sectionDiv.innerHTML=tabs;

/* PART CONTENT */

sec.parts.forEach((part,pindex)=>{

const safePart=`sec${sindex}_part${pindex}`;

/* PART BOX */

const partDiv=document.createElement('div');

partDiv.className=`
part-content
${pindex===0?'active':''}
`;

partDiv.id=`content-${safePart}`;

partDiv.innerHTML=`
<div class="part-title">${part}</div>
`;

/* DISEASE CONTAINER */

const diseaseBox=document.createElement('div');

diseaseBox.className='checkbox-container';

/* GET DISEASES */

const diseases=[...new Set(

masterData
.filter(x=>x.Parts===part)
.map(x=>x.Diseas)

)];

/* DROPDOWN */

const dropdown=document.createElement('div');

dropdown.className='disease-dropdown';

/* HEADER */

const header=document.createElement('div');

header.className='dropdown-header';

header.innerHTML=`
<span>${part}</span>
<span class="selected-count">0 منتخب</span>
`;

/* LIST */

const list=document.createElement('div');

list.className='dropdown-list';

/* OPEN CLOSE */

header.onclick=()=>{

list.classList.toggle('active');

};

/* DISEASES */

diseases.forEach(disease=>{

const label=document.createElement('label');

label.className='disease-option';

label.innerHTML=`
<input type="checkbox" value="${disease}">
<span>✔ ${disease}</span>
`;

const checkbox=label.querySelector('input');

/* CHECK EVENT */

checkbox.onchange=()=>{

if(checkbox.checked){

if(!selectedDiseases.includes(disease)){

selectedDiseases.push(disease);

}

}else{

selectedDiseases=
selectedDiseases.filter(x=>x!==disease);

}

/* UPDATE COUNT */

const checkedCount=
list.querySelectorAll('input:checked').length;

header.querySelector('.selected-count')
.innerText=checkedCount+' منتخب';

/* ANALYSIS */

calculateRemedies();

};

list.appendChild(label);

});

/* APPEND */

dropdown.appendChild(header);

dropdown.appendChild(list);

diseaseBox.appendChild(dropdown);

partDiv.appendChild(diseaseBox);

sectionDiv.appendChild(partDiv);

});

/* FINAL */

container.appendChild(sectionDiv);

});

}

/* SHOW PART */

function showPart(part,btn){

const parent=btn.closest('.section');

/* HIDE ALL */

parent.querySelectorAll('.part-content')
.forEach(x=>x.classList.remove('active'));

/* REMOVE ACTIVE */

parent.querySelectorAll('.part-btn')
.forEach(x=>x.classList.remove('active-tab'));

/* SHOW */

document
.getElementById('content-'+part)
.classList.add('active');

/* ACTIVE TAB */

btn.classList.add('active-tab');

}

/* SEARCH PATIENT */

async function searchPatient(){

const id=document
.getElementById('searchID')
.value
.trim();

if(id===""){

return alert("Patient ID درج کریں");

}

const res=await fetch(
API_URL+"?action=getPatient&id="+id
);

const data=await res.json();

if(!data){

return alert("ریکارڈ نہیں ملا");

}

/* SHOW PROFILE */

document
.getElementById('patientProfile')
.classList.remove('hidden');

/* FILL DATA */

document.getElementById('patientID').value=data.PatientID || '';

document.getElementById('name').value=data.Name || '';

document.getElementById('age').value=data.Age || '';

document.getElementById('gender').value=data.Gender || '';

document.getElementById('weight').value=data.Weight || '';

document.getElementById('mobile').value=data.Mobile || '';

/* RESET */

selectedDiseases=[];

/* CLEAR OLD CHECKS */

document
.querySelectorAll('.disease-option input')
.forEach(input=>{

input.checked=false;

});

/* LOAD SAVED DISEASES */

for(let i=1;i<=20;i++){

if(data['Diseas'+i]){

selectedDiseases.push(data['Diseas'+i]);

}

}

/* APPLY CHECKS */

setTimeout(()=>{

document
.querySelectorAll('.disease-option input')
.forEach(input=>{

if(selectedDiseases.includes(input.value)){

input.checked=true;

}

});

/* UPDATE COUNTS */

document.querySelectorAll('.dropdown-list')
.forEach(list=>{

const count=
list.querySelectorAll('input:checked').length;

const header=
list.parentElement.querySelector('.selected-count');

if(header){

header.innerText=count+' منتخب';

}

});

calculateRemedies();

},300);

}

/* CALCULATE REMEDIES */

function calculateRemedies(){

let remedyCount={};

selectedDiseases.forEach(disease=>{

const rows=
masterData.filter(x=>x.Diseas===disease);

rows.forEach(r=>{

const rem=r.Remedy;

remedyCount[rem]=
(remedyCount[rem]||0)+1;

});

});

const sorted=
Object.entries(remedyCount)
.sort((a,b)=>b[1]-a[1]);

let html='';

sorted.slice(0,20).forEach(r=>{

html+=`
<div class="remedy-item"
onclick="toggleSymptoms('${r[0].replace(/'/g,"\\'")}')">

<b>${r[0]}</b>
(${r[1]} علامات)

</div>

<div
id="symptom-${r[0].replace(/[^a-zA-Z0-9]/g,'_')}"
class="symptom-box">

لوڈ ہو رہا ہے...

</div>
`;

});

document.getElementById('remedyResult')
.innerHTML=html;

}

/* REMEDY DETAILS */

async function toggleSymptoms(remedy){

const safeId=
remedy.replace(/[^a-zA-Z0-9]/g,'_');

const box=
document.getElementById("symptom-"+safeId);

if(!box) return;

/* TOGGLE */

if(box.style.display==="block"){

box.style.display="none";

return;

}

box.style.display="block";

if(box.dataset.loaded==="yes") return;

/* FILTER */

const rows=
masterData.filter(x=>x.Remedy===remedy);

/* GROUP */

const categoryMap={};

rows.forEach(r=>{

const cat=
(r.Catagry || "OTHER").trim();

const sym=
(r.Symptom || "").trim();

if(!sym) return;

if(!categoryMap[cat]){

categoryMap[cat]=new Set();

}

categoryMap[cat].add(sym);

});

/* CATEGORIES */

const categories=
Object.keys(categoryMap);

let selectedCat=
categories[0] || "";

/* RENDER */

function render(cat){

let html="";

/* DROPDOWN */

html+=`
<div style="margin-bottom:10px;">

<select
id="cat-${safeId}"
style="
width:100%;
padding:8px;
border-radius:8px;
font-size:12px;
"

onchange="
window.updateCat_${safeId}(this.value)
">

`;

categories.forEach(c=>{

html+=`
<option
value="${c}"
${c===cat?'selected':''}>
${c}
</option>
`;

});

html+=`
</select>
</div>
`;

/* SYMPTOMS */

(categoryMap[cat] || []).forEach(sym=>{

html+=`
<div class="symptom-line">
✔ ${sym}
</div>
`;

});

box.innerHTML=html;

}

/* GLOBAL */

window["updateCat_"+safeId]=function(cat){

render(cat);

};

/* INITIAL */

render(selectedCat);

box.dataset.loaded="yes";

}

/* SAVE */

async function savePatientData(){
