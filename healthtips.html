<script>

const API_URL="https://script.google.com/macros/s/AKfycbz-j7aWwdXc-7UavXww03U-J83D3fbWg2YX6y8tnplvZ68eZsDfJHRS-xb8q2CV1nvs/exec";

let allTips=[];

async function loadTips(){
  const res = await fetch(API_URL);
  const data = await res.json();

  allTips = data;

  let html="";

  data.forEach((tip,i)=>{
    html+=`
    <div class="tip-card" onclick="showDetail(${i})">
      <img src="${tip.Pic}">
      <div class="tip-content">
        <h3>${tip.Tital1}</h3>
        <p>${tip.Shartdetail}</p>
        <button class="read-btn">مزید پڑھیں</button>
      </div>
    </div>`;
  });

  document.getElementById("tips").innerHTML=html;
}

function showDetail(i){

  let tip = allTips[i];

  document.getElementById("tips").style.display="none";
  document.getElementById("detailSection").style.display="block";

  detailBox.innerHTML=`
    <img src="${tip.Pic}">
    <h2>${tip.Tital1}</h2>
    <p>${tip.fulldetail}</p>
  `;

  window.scroٖllTo({top:0,behavior:"smooth"});
}

function back(){
  detailSection.style.display="none";
  tips.style.display="block";
}

function goPage(p){
  window.location.href=p;
}
function toggleMenu(){
  document.getElementById("navbar").classList.toggle("active");
}

loadTips();

</script>
