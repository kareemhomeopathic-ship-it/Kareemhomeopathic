<body>

<header>
<h1>🌿 ہیلتھ ٹپس</h1>
<p>قدرتی صحت معلومات اور ہومیوپیتھک تجاویز</p>
</header>

<div class="container">

<div class="loading" id="loading">
ڈیٹا لوڈ ہو رہا ہے...
</div>

<div id="posts"></div>

</div>

<footer>
© 2026 کریم ہومیوپیتھک کلینک - تمام حقوق محفوظ ہیں
</footer>

<script>

// 🔥 GOOGLE APPS SCRIPT API
const API_URL =
"https://script.google.com/macros/s/AKfycbz-j7aWwdXc-7UavXww03U-J83D3fbWg2YX6y8tnplvZ68eZsDfJHRS-xb8q2CV1nvs/exec";


// 🔥 CURRENT PAGE URL
const pageURL = window.location.href;


// 🔥 FETCH DATA
async function loadPosts(){

try{

const response = await fetch(API_URL);
const data = await response.json();

document.getElementById("loading").style.display = "none";

const container = document.getElementById("posts");

data.reverse();

data.forEach(item => {

const postURL =
window.location.origin +
window.location.pathname +
"?id=" + item.ID;

const shareText =
item.Tital1 + " - " + item.Shartdetail;

container.innerHTML += `

<div class="card">

<img src="${item.Pic}" alt="${item.Tital1}">

<div class="content">

<h2>${item.Tital1}</h2>

<p class="short">
${item.Shartdetail}
</p>

<p class="full">
${item.fulldetail}
</p>

<div class="share-box">

<button class="share-btn fb"
onclick="shareFacebook('${postURL}')">
فیس بک
</button>

<button class="share-btn wa"
onclick="shareWhatsApp('${shareText}','${postURL}')">
واٹس ایپ
</button>

<button class="share-btn tw"
onclick="shareTwitter('${shareText}','${postURL}')">
ٹوئٹر
</button>

<button class="share-btn in"
onclick="shareInstagram()">
انسٹاگرام
</button>

</div>

</div>

</div>

`;

});

}catch(error){

document.getElementById("loading").innerHTML =
"ڈیٹا لوڈ نہیں ہو سکا";

console.log(error);

}

}


// 🔥 FACEBOOK SHARE
function shareFacebook(url){

window.open(
`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
'_blank'
);

}


// 🔥 WHATSAPP SHARE
function shareWhatsApp(text,url){

window.open(
`https://wa.me/?text=${encodeURIComponent(text + " " + url)}`,
'_blank'
);

}


// 🔥 TWITTER SHARE
function shareTwitter(text,url){

window.open(
`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
'_blank'
);

}


// 🔥 INSTAGRAM
function shareInstagram(){

alert("انسٹاگرام براہ راست لنک شیئر کی اجازت نہیں دیتا۔ پوسٹ لنک کاپی کر کے انسٹاگرام میں استعمال کریں۔");

}


// 🔥 DYNAMIC META TAG UPDATE
function updateMeta(post){

document.title = post.Tital1;

document.querySelector('meta[name="description"]')
.setAttribute("content", post.Shartdetail);

document.querySelector('meta[property="og:title"]')
.setAttribute("content", post.Tital1);

document.querySelector('meta[property="og:description"]')
.setAttribute("content", post.Shartdetail);

document.querySelector('meta[property="og:image"]')
.setAttribute("content", post.Pic);

document.querySelector('meta[name="twitter:title"]')
.setAttribute("content", post.Tital1);

document.querySelector('meta[name="twitter:description"]')
.setAttribute("content", post.Shartdetail);

document.querySelector('meta[name="twitter:image"]')
.setAttribute("content", post.Pic);

}


// 🔥 SINGLE POST OPEN
async function checkSinglePost(){

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

if(!id) return;

try{

const response = await fetch(API_URL);
const data = await response.json();

const post = data.find(x => x.ID == id);

if(post){

updateMeta(post);

}

}catch(err){

console.log(err);

}

}

checkSinglePost();
loadPosts();

</script>
